AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Bootstrap resources for Arabic Voice Agent AWS deployments (preview + production).
  Creates ECR repository and IAM roles. Expects an existing GitHub OIDC provider.

Parameters:
  GitHubOrg:
    Type: String
    Default: tanyagray
    Description: GitHub organization or user name

  GitHubRepo:
    Type: String
    Default: arabic-voice-agent
    Description: GitHub repository name

  GitHubOidcProviderArn:
    Type: String
    Description: ARN of the existing GitHub OIDC provider in this account

Resources:
  # --- VPC (shared by ECS/ALB in prod and preview) ---

  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: arabic-voice-agent

  SubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: arabic-voice-agent-public-a

  SubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: arabic-voice-agent-public-b

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetA
      RouteTableId: !Ref RouteTable

  SubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetB
      RouteTableId: !Ref RouteTable

  # --- ECS Task Execution Role (shared; pulls ECR images, writes logs, reads secrets) ---

  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ecs-task-execution
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: "*"

  # --- ECR Repositories ---
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: arabic-voice-agent-api
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Delete untagged images older than 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }

  ClaudeAgentEcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: arabic-voice-agent-claude-agent
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Delete untagged images older than 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }

  # --- IAM Role for GitHub Actions ---
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: github-actions-preview-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: PreviewDeployPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # ECR - push/pull/delete images
              - Sid: EcrAuth
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Sid: EcrReadWrite
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:BatchDeleteImage
                Resource:
                  - !GetAtt EcrRepository.Arn
                  - !GetAtt ClaudeAgentEcrRepository.Arn

              # App Runner - manage preview services and custom domains
              - Sid: AppRunner
                Effect: Allow
                Action:
                  - apprunner:CreateService
                  - apprunner:UpdateService
                  - apprunner:DeleteService
                  - apprunner:DescribeService
                  - apprunner:ListServices
                  - apprunner:ListOperations
                  - apprunner:TagResource
                  - apprunner:UntagResource
                  - apprunner:CreateAutoScalingConfiguration
                  - apprunner:DeleteAutoScalingConfiguration
                  - apprunner:DescribeAutoScalingConfiguration
                  - apprunner:StartDeployment
                  - apprunner:AssociateCustomDomain
                  - apprunner:DisassociateCustomDomain
                  - apprunner:DescribeCustomDomains
                Resource: "*"

              # S3 - manage preview and production static site buckets
              - Sid: S3
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:PutBucketWebsite
                  - s3:GetBucketWebsite
                  - s3:DeleteBucketWebsite
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetBucketPublicAccessBlock
                  - s3:PutBucketOwnershipControls
                  - s3:GetBucketOwnershipControls
                  - s3:TagResource
                  - s3:PutBucketTagging
                  - s3:GetBucketTagging
                Resource:
                  - "arn:aws:s3:::preview-*"
                  - "arn:aws:s3:::preview-*/*"
                  - "arn:aws:s3:::arabic-voice-agent-prod-*"
                  - "arn:aws:s3:::arabic-voice-agent-prod-*/*"

              # App Runner service-linked role (required on first use in account)
              - Sid: ServiceLinkedRole
                Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: "arn:aws:iam::*:role/aws-service-role/apprunner.amazonaws.com/*"
                Condition:
                  StringLike:
                    "iam:AWSServiceName": apprunner.amazonaws.com

              # CloudFront - manage preview distributions
              - Sid: CloudFront
                Effect: Allow
                Action:
                  - cloudfront:CreateDistribution
                  - cloudfront:UpdateDistribution
                  - cloudfront:DeleteDistribution
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:ListDistributions
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetInvalidation
                  - cloudfront:ListInvalidations
                  - cloudfront:CreateOriginAccessControl
                  - cloudfront:DeleteOriginAccessControl
                  - cloudfront:GetOriginAccessControl
                  - cloudfront:UpdateOriginAccessControl
                  - cloudfront:ListOriginAccessControls
                  - cloudfront:TagResource
                  - cloudfront:UntagResource
                Resource: "*"

              # CloudFormation - manage preview and production stacks
              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListStacks
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                Resource:
                  - !Sub "arn:aws:cloudformation:*:${AWS::AccountId}:stack/preview-pr-*/*"
                  - !Sub "arn:aws:cloudformation:*:${AWS::AccountId}:stack/arabic-voice-agent-prod/*"

              # ECS - manage clusters, services, task definitions
              - Sid: Ecs
                Effect: Allow
                Action:
                  - ecs:CreateCluster
                  - ecs:DeleteCluster
                  - ecs:DescribeClusters
                  - ecs:RegisterTaskDefinition
                  - ecs:DeregisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                  - ecs:CreateService
                  - ecs:UpdateService
                  - ecs:DeleteService
                  - ecs:DescribeServices
                  - ecs:ListServices
                  - ecs:TagResource
                  - ecs:UntagResource
                  - ecs:ListTagsForResource
                Resource: "*"

              # ALB - manage load balancers, listeners, and target groups
              - Sid: Elb
                Effect: Allow
                Action:
                  - elasticloadbalancing:CreateLoadBalancer
                  - elasticloadbalancing:DeleteLoadBalancer
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeLoadBalancerAttributes
                  - elasticloadbalancing:ModifyLoadBalancerAttributes
                  - elasticloadbalancing:SetSecurityGroups
                  - elasticloadbalancing:CreateListener
                  - elasticloadbalancing:DeleteListener
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:ModifyListener
                  - elasticloadbalancing:CreateTargetGroup
                  - elasticloadbalancing:DeleteTargetGroup
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTargetGroupAttributes
                  - elasticloadbalancing:ModifyTargetGroup
                  - elasticloadbalancing:ModifyTargetGroupAttributes
                  - elasticloadbalancing:DescribeTargetHealth
                  - elasticloadbalancing:RegisterTargets
                  - elasticloadbalancing:DeregisterTargets
                  - elasticloadbalancing:AddTags
                  - elasticloadbalancing:RemoveTags
                  - elasticloadbalancing:DescribeTags
                Resource: "*"

              # EC2 - security groups and VPC reads for ECS/ALB
              - Sid: Ec2
                Effect: Allow
                Action:
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:DescribeSecurityGroups
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                  - ec2:DescribeAvailabilityZones
                  - ec2:CreateTags
                  - ec2:DescribeTags
                Resource: "*"

              # IAM - manage roles created inside prod/preview stacks, and pass roles
              - Sid: IamRoles
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/prod-*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/preview-*"

              # IAM - pass roles to App Runner and ECS
              - Sid: PassRole
                Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt AppRunnerEcrAccessRole.Arn
                  - !GetAtt EcsTaskExecutionRole.Arn
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/prod-*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/preview-*"

              # CloudWatch Logs - create log groups for ECS containers
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:PutRetentionPolicy
                Resource: "*"

  # --- IAM Role for App Runner to pull from ECR ---
  AppRunnerEcrAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: apprunner-ecr-access
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EcrPullPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource:
                  - !GetAtt EcrRepository.Arn
                  - !GetAtt ClaudeAgentEcrRepository.Arn

Outputs:
  VpcId:
    Description: VPC ID for ECS/ALB resources (read dynamically by deploy workflows)
    Value: !Ref Vpc

  SubnetIds:
    Description: Comma-separated public subnet IDs (read dynamically by deploy workflows)
    Value: !Join [",", [!Ref SubnetA, !Ref SubnetB]]

  EcsTaskExecutionRoleArn:
    Description: ECS task execution role ARN (read dynamically by deploy workflows)
    Value: !GetAtt EcsTaskExecutionRole.Arn

  EcrRepositoryUri:
    Description: ECR repository URI (set as GitHub secret ECR_REGISTRY)
    Value: !GetAtt EcrRepository.RepositoryUri

  EcrRepositoryArn:
    Description: ECR repository ARN
    Value: !GetAtt EcrRepository.Arn

  GitHubActionsRoleArn:
    Description: IAM role ARN for GitHub Actions (set as GitHub secret AWS_ROLE_ARN)
    Value: !GetAtt GitHubActionsRole.Arn

  AppRunnerEcrAccessRoleArn:
    Description: IAM role ARN for App Runner ECR access (set as GitHub secret APP_RUNNER_ECR_ROLE_ARN)
    Value: !GetAtt AppRunnerEcrAccessRole.Arn

  ClaudeAgentEcrRepositoryUri:
    Description: Claude agent ECR repository URI
    Value: !GetAtt ClaudeAgentEcrRepository.RepositoryUri

  ClaudeAgentEcrRepositoryArn:
    Description: Claude agent ECR repository ARN
    Value: !GetAtt ClaudeAgentEcrRepository.Arn
