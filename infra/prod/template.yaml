AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production environment for Arabic Voice Agent.
  Creates App Runner (API), S3 + CloudFront (web-app, admin-app).
  The Claude Agent is deployed separately via the arabic-voice-agent-claude-agent stack.

Parameters:
  AcmCertificateArn:
    Type: String
    Default: ""
    Description: >
      ARN of an ACM certificate in us-east-1 covering mishmish.ai and *.mishmish.ai.
      Required for custom domain aliases on CloudFront distributions.
      Leave empty to use the default CloudFront certificate (no custom domain).

  EcrImageUri:
    Type: String
    Description: "Full ECR image URI for web-api"

  VpcId:
    Type: String
    Description: VPC ID (from bootstrap stack output VpcId)

  SubnetIds:
    Type: CommaDelimitedList
    Description: Comma-separated public subnet IDs (from bootstrap stack output SubnetIds)

  EcsTaskExecutionRoleArn:
    Type: String
    Description: ECS task execution role ARN (from bootstrap stack output EcsTaskExecutionRoleArn)

  ApiAcmCertificateArn:
    Type: String
    Description: >
      ACM certificate ARN in us-west-2 covering api.mishmish.ai.
      Required for HTTPS on the API load balancer.

  ApiSecretArn:
    Type: String
    Description: >
      ARN of the AWS Secrets Manager secret containing API secrets
      (mishmish/prod/api). Expected keys: SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY,
      SUPABASE_SECRET_KEY, OPENAI_API_KEY, SONIOX_API_KEY, ELEVEN_API_KEY.

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref AcmCertificateArn, ""]]

Resources:
  # ============================================================
  # API Service — Instance Role (Secrets Manager access)
  # ============================================================

  ApiInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: prod-api-instance-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApiSecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Ref ApiSecretArn

  # ============================================================
  # API Service (ECS Fargate + ALB)
  # App Runner does not support WebSocket connections; ALB does.
  # ============================================================

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP/HTTPS inbound to API ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Environment
          Value: production

  ApiContainerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow traffic from ALB to API containers on port 8000
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Environment
          Value: production

  ApiAlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: prod-api
      Scheme: internet-facing
      Type: application
      Subnets: !Ref SubnetIds
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Tags:
        - Key: Environment
          Value: production

  ApiTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: prod-api
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: 8000
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      Tags:
        - Key: Environment
          Value: production

  ApiAlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApiAlb
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref ApiAcmCertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ApiTargetGroup

  ApiHttpRedirectListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApiAlb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  ApiCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: prod-api
      Tags:
        - Key: Environment
          Value: production

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/prod-api
      RetentionInDays: 14

  ApiTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: prod-api
      Cpu: "1024"
      Memory: "2048"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Ref EcsTaskExecutionRoleArn
      TaskRoleArn: !GetAtt ApiInstanceRole.Arn
      ContainerDefinitions:
        - Name: api
          Image: !Ref EcrImageUri
          PortMappings:
            - ContainerPort: 8000
          Environment:
            - Name: PORT
              Value: "8000"
          Secrets:
            - Name: SUPABASE_URL
              ValueFrom: !Sub "${ApiSecretArn}:SUPABASE_URL::"
            - Name: SUPABASE_PUBLISHABLE_KEY
              ValueFrom: !Sub "${ApiSecretArn}:SUPABASE_PUBLISHABLE_KEY::"
            - Name: SUPABASE_SECRET_KEY
              ValueFrom: !Sub "${ApiSecretArn}:SUPABASE_SECRET_KEY::"
            - Name: OPENAI_API_KEY
              ValueFrom: !Sub "${ApiSecretArn}:OPENAI_API_KEY::"
            - Name: SONIOX_API_KEY
              ValueFrom: !Sub "${ApiSecretArn}:SONIOX_API_KEY::"
            - Name: ELEVEN_API_KEY
              ValueFrom: !Sub "${ApiSecretArn}:ELEVEN_API_KEY::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/prod-api
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: api
      Tags:
        - Key: Environment
          Value: production

  ApiEcsService:
    Type: AWS::ECS::Service
    DependsOn: ApiAlbListener
    Properties:
      ServiceName: prod-api
      Cluster: !Ref ApiCluster
      TaskDefinition: !Ref ApiTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref ApiContainerSecurityGroup
      LoadBalancers:
        - ContainerName: api
          ContainerPort: 8000
          TargetGroupArn: !Ref ApiTargetGroup
      HealthCheckGracePeriodSeconds: 60
      Tags:
        - Key: Environment
          Value: production

  # ============================================================
  # Web App (S3 + CloudFront)
  # ============================================================

  WebAppBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: arabic-voice-agent-prod-web-app
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: production

  WebAppBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebAppBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebAppBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebAppDistribution}"

  WebAppOac:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: prod-web-app
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebAppDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Production - web-app
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Aliases: !If
          - HasCustomDomain
          - [mishmish.ai, www.mishmish.ai]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebAppBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt WebAppOac.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
      Tags:
        - Key: Environment
          Value: production

  # ============================================================
  # Admin App (S3 + CloudFront)
  # ============================================================

  AdminBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: arabic-voice-agent-prod-admin
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: production

  AdminBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AdminBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${AdminBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AdminDistribution}"

  AdminOac:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: prod-admin
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AdminDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Production - admin
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Aliases: !If
          - HasCustomDomain
          - [admin.mishmish.ai]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt AdminBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt AdminOac.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
      Tags:
        - Key: Environment
          Value: production

Outputs:
  ApiUrl:
    Description: ECS/ALB API URL
    Value: !Sub "https://${ApiAlb.DNSName}"

  ApiAlbDnsName:
    Description: >
      ALB DNS name — point api.mishmish.ai CNAME here
    Value: !GetAtt ApiAlb.DNSName

  WebAppUrl:
    Description: Web app CloudFront URL
    Value: !Sub "https://${WebAppDistribution.DomainName}"

  WebAppDistributionId:
    Description: Web app CloudFront distribution ID (for cache invalidation)
    Value: !Ref WebAppDistribution

  AdminUrl:
    Description: Admin app CloudFront URL
    Value: !Sub "https://${AdminDistribution.DomainName}"

  AdminDistributionId:
    Description: Admin CloudFront distribution ID (for cache invalidation)
    Value: !Ref AdminDistribution

  WebAppBucketName:
    Description: Web app S3 bucket name
    Value: !Ref WebAppBucket

  AdminBucketName:
    Description: Admin S3 bucket name
    Value: !Ref AdminBucket

  WebAppCloudFrontDomain:
    Description: >
      Web app CloudFront domain (point mishmish.ai and www.mishmish.ai here via ALIAS/CNAME)
    Value: !GetAtt WebAppDistribution.DomainName

  AdminCloudFrontDomain:
    Description: >
      Admin CloudFront domain (point admin.mishmish.ai here via CNAME)
    Value: !GetAtt AdminDistribution.DomainName
