AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Preview environment for Arabic Voice Agent.
  Creates App Runner (API), S3 + CloudFront (web-app, admin-app) per PR.

Parameters:
  PrNumber:
    Type: String
    Description: Pull request number

  EcrImageUri:
    Type: String
    Description: "Full ECR image URI (e.g. 123456789.dkr.ecr.us-west-2.amazonaws.com/arabic-voice-agent-api:pr-42)"

  AppRunnerEcrRoleArn:
    Type: String
    Description: ARN of the IAM role that allows App Runner to pull from ECR

  # --- Supabase (dynamic per PR) ---
  SupabaseUrl:
    Type: String
    Description: Supabase branch URL

  SupabaseAnonKey:
    Type: String
    NoEcho: true
    Description: Supabase branch anon key

  SupabaseServiceKey:
    Type: String
    NoEcho: true
    Description: Supabase branch service role key

  # --- API keys (from GitHub secrets) ---
  OpenaiApiKey:
    Type: String
    NoEcho: true
    Description: OpenAI API key

  DeepgramApiKey:
    Type: String
    NoEcho: true
    Description: Deepgram API key

  ElevenApiKey:
    Type: String
    NoEcho: true
    Description: ElevenLabs API key

Resources:
  # ============================================================
  # API Service (App Runner)
  # ============================================================

  ApiAutoScalingConfig:
    Type: AWS::AppRunner::AutoScalingConfiguration
    Properties:
      AutoScalingConfigurationName: !Sub "preview-api-pr-${PrNumber}"
      MaxConcurrency: 50
      MinSize: 1
      MaxSize: 2

  ApiService:
    Type: AWS::AppRunner::Service
    Properties:
      ServiceName: !Sub "preview-api-pr-${PrNumber}"
      SourceConfiguration:
        AuthenticationConfiguration:
          AccessRoleArn: !Ref AppRunnerEcrRoleArn
        AutoDeploymentsEnabled: false
        ImageRepository:
          ImageIdentifier: !Ref EcrImageUri
          ImageRepositoryType: ECR
          ImageConfiguration:
            Port: "8000"
            RuntimeEnvironmentVariables:
              - Name: SUPABASE_URL
                Value: !Ref SupabaseUrl
              - Name: SUPABASE_PUBLISHABLE_KEY
                Value: !Ref SupabaseAnonKey
              - Name: SUPABASE_SECRET_KEY
                Value: !Ref SupabaseServiceKey
              - Name: OPENAI_API_KEY
                Value: !Ref OpenaiApiKey
              - Name: DEEPGRAM_API_KEY
                Value: !Ref DeepgramApiKey
              - Name: ELEVEN_API_KEY
                Value: !Ref ElevenApiKey
              - Name: PORT
                Value: "8000"
      InstanceConfiguration:
        Cpu: "1024"
        Memory: "2048"
      AutoScalingConfigurationArn: !GetAtt ApiAutoScalingConfig.AutoScalingConfigurationArn
      HealthCheckConfiguration:
        Protocol: HTTP
        Path: /health
        Interval: 10
        Timeout: 5
        HealthyThreshold: 1
        UnhealthyThreshold: 5
      Tags:
        - Key: Environment
          Value: preview
        - Key: PrNumber
          Value: !Ref PrNumber

  # ============================================================
  # Web App (S3 + CloudFront)
  # ============================================================

  WebAppBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub "preview-web-app-pr-${PrNumber}"
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: preview
        - Key: PrNumber
          Value: !Ref PrNumber

  WebAppBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebAppBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebAppBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebAppDistribution}"

  WebAppOac:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "preview-web-app-pr-${PrNumber}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebAppDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "Preview PR #${PrNumber} - web-app"
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebAppBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt WebAppOac.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
      Tags:
        - Key: Environment
          Value: preview
        - Key: PrNumber
          Value: !Ref PrNumber

  # ============================================================
  # Admin App (S3 + CloudFront)
  # ============================================================

  AdminBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub "preview-admin-pr-${PrNumber}"
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: preview
        - Key: PrNumber
          Value: !Ref PrNumber

  AdminBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AdminBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${AdminBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AdminDistribution}"

  AdminOac:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "preview-admin-pr-${PrNumber}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AdminDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "Preview PR #${PrNumber} - admin"
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt AdminBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt AdminOac.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
      Tags:
        - Key: Environment
          Value: preview
        - Key: PrNumber
          Value: !Ref PrNumber

Outputs:
  ApiUrl:
    Description: App Runner API URL
    Value: !Sub "https://${ApiService.ServiceUrl}"

  WebAppUrl:
    Description: Web app CloudFront URL
    Value: !Sub "https://${WebAppDistribution.DomainName}"

  WebAppDistributionId:
    Description: Web app CloudFront distribution ID (for cache invalidation)
    Value: !Ref WebAppDistribution

  AdminUrl:
    Description: Admin app CloudFront URL
    Value: !Sub "https://${AdminDistribution.DomainName}"

  AdminDistributionId:
    Description: Admin CloudFront distribution ID (for cache invalidation)
    Value: !Ref AdminDistribution

  WebAppBucketName:
    Description: Web app S3 bucket name (for uploading static files)
    Value: !Ref WebAppBucket

  AdminBucketName:
    Description: Admin S3 bucket name (for uploading static files)
    Value: !Ref AdminBucket
