AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Shared preview infrastructure for Arabic Voice Agent.
  Creates a single EC2 spot instance with Caddy + Docker.
  PR-specific containers are managed by GitHub Actions via SSM Run Command.
  Deployed once — not per-PR.

Parameters:
  VpcId:
    Type: String
    Description: VPC ID (from bootstrap stack output VpcId)

  SubnetId:
    Type: String
    Description: Public subnet ID for EC2 instance (from bootstrap stack output SubnetAId)

  Ec2InstanceProfileName:
    Type: String
    Description: EC2 instance profile name (from bootstrap stack output Ec2InstanceProfileName)

Resources:
  # ============================================================
  # Preview API — Shared EC2 Spot Instance + Caddy
  # ============================================================

  PreviewApiSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP/HTTPS inbound to preview API EC2 instance
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: preview-api
        - Key: Environment
          Value: preview

  PreviewElasticIp:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: preview-api
        - Key: Environment
          Value: preview

  PreviewInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.small
      # Note: instance was launched as spot via InstanceMarketOptions, but that
      # property isn't supported on AWS::EC2::Instance — removed to unblock
      # stack updates. The existing spot instance is unaffected.
      ImageId: !Sub "resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64"
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref PreviewApiSecurityGroup
      IamInstanceProfile: !Ref Ec2InstanceProfileName
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail

          # Log all output
          exec > >(tee /var/log/user-data.log) 2>&1
          echo "=== Starting cloud-init at $(date) ==="

          # Install Docker
          dnf install -y docker
          systemctl enable docker
          systemctl start docker

          # Install Caddy (direct binary — AL2023 has no RPM package)
          curl -sL "https://github.com/caddyserver/caddy/releases/download/v2.9.1/caddy_2.9.1_linux_amd64.tar.gz" -o /tmp/caddy.tar.gz
          tar xzf /tmp/caddy.tar.gz -C /usr/bin caddy
          chmod +x /usr/bin/caddy
          rm /tmp/caddy.tar.gz

          # Create caddy user/group and systemd service
          groupadd -r caddy 2>/dev/null || true
          useradd -r -g caddy -d /var/lib/caddy -s /sbin/nologin caddy 2>/dev/null || true
          mkdir -p /var/lib/caddy /etc/caddy /var/log/caddy
          chown caddy:caddy /var/lib/caddy /var/log/caddy

          cat > /etc/systemd/system/caddy.service <<'SVCEOF'
          [Unit]
          Description=Caddy
          After=network.target
          [Service]
          User=caddy
          Group=caddy
          ExecStart=/usr/bin/caddy run --environ --config /etc/caddy/Caddyfile
          ExecReload=/usr/bin/caddy reload --config /etc/caddy/Caddyfile
          TimeoutStopSec=5s
          LimitNOFILE=1048576
          AmbientCapabilities=CAP_NET_BIND_SERVICE
          Restart=on-failure
          [Install]
          WantedBy=multi-user.target
          SVCEOF
          systemctl daemon-reload
          systemctl enable caddy

          # Install jq for JSON parsing
          dnf install -y jq

          # Create config directory
          mkdir -p /etc/mishmish

          # Write empty Caddyfile (PR blocks added via SSM)
          cat > /etc/caddy/Caddyfile <<'CADDYEOF'
          # Preview — PR-specific blocks are appended below by GitHub Actions.
          # Each block routes api-pr-X, pr-X, and admin-pr-X subdomains.
          CADDYEOF

          # Start Caddy
          systemctl start caddy

          echo "=== Cloud-init complete at $(date) ==="
      Tags:
        - Key: Name
          Value: preview-api
        - Key: Environment
          Value: preview

  PreviewEipAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt PreviewElasticIp.AllocationId
      InstanceId: !Ref PreviewInstance

  # ============================================================
  # Preview Static Sites — Shared S3 + CloudFront
  # ============================================================
  # All PR preview builds are stored in a single bucket under
  # pr-{N}/web-app/ and pr-{N}/admin-app/ prefixes.

  PreviewStaticBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: preview.mishmish.ai
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: arabic-voice-agent
        - Key: Environment
          Value: preview

  PreviewStaticBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PreviewStaticBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${PreviewStaticBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${PreviewStaticDistribution}"

  PreviewStaticOac:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: preview.mishmish.ai
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  PreviewSpaRoutingFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: preview-spa-routing
      AutoPublish: true
      FunctionConfig:
        Comment: SPA routing for shared preview bucket — rewrites non-asset paths to index.html
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          // Static assets (have file extension) — serve as-is
          if (uri.match(/\.[a-zA-Z0-9]+$/)) {
            return request;
          }
          // SPA route — rewrite to the PR + app's index.html
          // Path format: /pr-{N}/web-app/... or /pr-{N}/admin-app/...
          var match = uri.match(/^\/pr-\d+\/[^\/]+/);
          if (match) {
            request.uri = match[0] + '/index.html';
          }
          return request;
        }

  PreviewStaticDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Shared preview static sites (all PRs)
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt PreviewStaticBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt PreviewStaticOac.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt PreviewSpaRoutingFunction.FunctionARN
      Tags:
        - Key: Environment
          Value: preview

Outputs:
  PreviewInstanceId:
    Description: EC2 instance ID for the shared preview server
    Value: !Ref PreviewInstance

  PreviewElasticIp:
    Description: >
      Elastic IP for the preview server — point *.preview.mishmish.ai A record here
    Value: !Ref PreviewElasticIp

  PreviewStaticBucketName:
    Description: Shared S3 bucket for all PR preview static sites
    Value: !Ref PreviewStaticBucket

  PreviewStaticDistributionId:
    Description: Shared CloudFront distribution ID (for cache invalidation)
    Value: !Ref PreviewStaticDistribution

  PreviewStaticDistributionDomain:
    Description: Shared CloudFront distribution domain (for Caddy reverse proxy)
    Value: !GetAtt PreviewStaticDistribution.DomainName
