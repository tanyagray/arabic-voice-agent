AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production environment for Arabic Voice Agent.
  Creates EC2 + Caddy + Docker (API), S3 + CloudFront (web-app, admin-app).
  The Claude Agent is deployed separately via the arabic-voice-agent-claude-agent stack.

Parameters:
  AcmCertificateArn:
    Type: String
    Default: ""
    Description: >
      ARN of an ACM certificate in us-east-1 covering mishmish.ai and *.mishmish.ai.
      Required for custom domain aliases on CloudFront distributions.
      Leave empty to use the default CloudFront certificate (no custom domain).

  EcrImageUri:
    Type: String
    Description: "Full ECR image URI for web-api"

  VpcId:
    Type: String
    Description: VPC ID (from bootstrap stack output VpcId)

  SubnetId:
    Type: String
    Description: Public subnet ID for EC2 instance (from bootstrap stack output SubnetAId)

  Ec2InstanceProfileName:
    Type: String
    Description: EC2 instance profile name (from bootstrap stack output Ec2InstanceProfileName)

  ApiSecretArn:
    Type: String
    Description: >
      ARN of the AWS Secrets Manager secret containing API secrets
      (mishmish/prod/api). Expected keys: SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY,
      SUPABASE_SECRET_KEY, OPENAI_API_KEY, SONIOX_API_KEY, ELEVEN_API_KEY.

  ApiDomain:
    Type: String
    Default: api.mishmish.ai
    Description: Domain name for the API (used in Caddy config for HTTPS)

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref AcmCertificateArn, ""]]

Resources:
  # ============================================================
  # API Service — EC2 + Caddy + Docker
  # ============================================================

  ApiSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP/HTTPS inbound to API EC2 instance
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: api.mishmish.ai
        - Key: Project
          Value: arabic-voice-agent
        - Key: Environment
          Value: production

  ApiElasticIp:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: api.mishmish.ai
        - Key: Project
          Value: arabic-voice-agent
        - Key: Environment
          Value: production

  ApiInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Sub "resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64"
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref ApiSecurityGroup
      IamInstanceProfile: !Ref Ec2InstanceProfileName
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail

          # Log all output
          exec > >(tee /var/log/user-data.log) 2>&1
          echo "=== Starting cloud-init at $(date) ==="

          # Install Docker
          dnf install -y docker
          systemctl enable docker
          systemctl start docker

          # Install Caddy (direct binary — AL2023 has no RPM package)
          curl -sL "https://github.com/caddyserver/caddy/releases/download/v2.9.1/caddy_2.9.1_linux_amd64.tar.gz" -o /tmp/caddy.tar.gz
          tar xzf /tmp/caddy.tar.gz -C /usr/bin caddy
          chmod +x /usr/bin/caddy
          rm /tmp/caddy.tar.gz

          # Create caddy user/group and systemd service
          groupadd -r caddy 2>/dev/null || true
          useradd -r -g caddy -d /var/lib/caddy -s /sbin/nologin caddy 2>/dev/null || true
          mkdir -p /var/lib/caddy /etc/caddy /var/log/caddy
          chown caddy:caddy /var/lib/caddy /var/log/caddy

          cat > /etc/systemd/system/caddy.service <<'SVCEOF'
          [Unit]
          Description=Caddy
          After=network.target
          [Service]
          User=caddy
          Group=caddy
          ExecStart=/usr/bin/caddy run --environ --config /etc/caddy/Caddyfile
          ExecReload=/usr/bin/caddy reload --config /etc/caddy/Caddyfile
          TimeoutStopSec=5s
          LimitNOFILE=1048576
          AmbientCapabilities=CAP_NET_BIND_SERVICE
          Restart=on-failure
          [Install]
          WantedBy=multi-user.target
          SVCEOF
          systemctl daemon-reload
          systemctl enable caddy

          # Install jq for JSON parsing
          dnf install -y jq

          # Create config directory
          mkdir -p /etc/mishmish

          # Fetch secrets from Secrets Manager and write env file
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "${ApiSecretArn}" \
            --region "${AWS::Region}" \
            --query SecretString --output text)

          echo "SUPABASE_URL=$(echo "$SECRET_JSON" | jq -r '.SUPABASE_URL')" > /etc/mishmish/api.env
          echo "SUPABASE_PUBLISHABLE_KEY=$(echo "$SECRET_JSON" | jq -r '.SUPABASE_PUBLISHABLE_KEY')" >> /etc/mishmish/api.env
          echo "SUPABASE_SECRET_KEY=$(echo "$SECRET_JSON" | jq -r '.SUPABASE_SECRET_KEY')" >> /etc/mishmish/api.env
          echo "OPENAI_API_KEY=$(echo "$SECRET_JSON" | jq -r '.OPENAI_API_KEY')" >> /etc/mishmish/api.env
          echo "SONIOX_API_KEY=$(echo "$SECRET_JSON" | jq -r '.SONIOX_API_KEY')" >> /etc/mishmish/api.env
          echo "ELEVEN_API_KEY=$(echo "$SECRET_JSON" | jq -r '.ELEVEN_API_KEY')" >> /etc/mishmish/api.env
          echo "PORT=8000" >> /etc/mishmish/api.env
          chmod 600 /etc/mishmish/api.env

          # ECR login and pull initial image
          REGION="${AWS::Region}"
          ECR_REGISTRY=$(echo "${EcrImageUri}" | cut -d'/' -f1)
          aws ecr get-login-password --region "$REGION" | \
            docker login --username AWS --password-stdin "$ECR_REGISTRY"
          docker pull "${EcrImageUri}"

          # Run the API container
          docker run -d \
            --name api \
            --restart unless-stopped \
            -p 8000:8000 \
            --env-file /etc/mishmish/api.env \
            "${EcrImageUri}"

          # Write Caddyfile
          cat > /etc/caddy/Caddyfile <<'CADDYEOF'
          ${ApiDomain} {
            # CORS headers — belt-and-suspenders with FastAPI CORSMiddleware
            # so that even 5xx errors from the app always include CORS headers.
            @cors_preflight method OPTIONS
            handle @cors_preflight {
              header Access-Control-Allow-Origin "*"
              header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
              header Access-Control-Allow-Headers "*"
              header Access-Control-Max-Age "86400"
              respond "" 204
            }
            # ? prefix = set only if not already present (avoids duplicate with FastAPI)
            header ?Access-Control-Allow-Origin "*"
            header ?Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
            header ?Access-Control-Allow-Headers "*"

            reverse_proxy localhost:8000
          }
          CADDYEOF

          # Start Caddy
          systemctl start caddy

          echo "=== Cloud-init complete at $(date) ==="
      Tags:
        - Key: Name
          Value: api.mishmish.ai
        - Key: Project
          Value: arabic-voice-agent
        - Key: Environment
          Value: production

  ApiEipAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ApiElasticIp.AllocationId
      InstanceId: !Ref ApiInstance

  # ============================================================
  # Shared Static Sites Bucket (S3)
  # ============================================================
  # Both web-app and admin-app are stored in a single bucket
  # under web-app/ and admin-app/ prefixes.

  StaticBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: mishmish-prod
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: arabic-voice-agent
        - Key: Environment
          Value: production

  StaticBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${StaticBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn":
                  - !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebAppDistribution}"
                  - !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AdminDistribution}"

  StaticOac:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: mishmish.ai
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ============================================================
  # Web App (CloudFront)
  # ============================================================

  WebAppDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Production - web-app
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Aliases: !If
          - HasCustomDomain
          - [mishmish.ai, www.mishmish.ai]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt StaticBucket.RegionalDomainName
            OriginPath: /web-app
            OriginAccessControlId: !GetAtt StaticOac.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
      Tags:
        - Key: Project
          Value: arabic-voice-agent
        - Key: Environment
          Value: production

  # ============================================================
  # Admin App (CloudFront)
  # ============================================================

  AdminDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Production - admin
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Aliases: !If
          - HasCustomDomain
          - [admin.mishmish.ai]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt StaticBucket.RegionalDomainName
            OriginPath: /admin-app
            OriginAccessControlId: !GetAtt StaticOac.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
      Tags:
        - Key: Project
          Value: arabic-voice-agent
        - Key: Environment
          Value: production

Outputs:
  ApiInstanceId:
    Description: EC2 instance ID for the API server
    Value: !Ref ApiInstance

  ApiElasticIp:
    Description: >
      Elastic IP for the API server — point api.mishmish.ai A record here
    Value: !Ref ApiElasticIp

  ApiUrl:
    Description: API URL (once DNS is configured)
    Value: !Sub "https://${ApiDomain}"

  WebAppDistributionId:
    Description: Web app CloudFront distribution ID (for cache invalidation)
    Value: !Ref WebAppDistribution

  AdminDistributionId:
    Description: Admin CloudFront distribution ID (for cache invalidation)
    Value: !Ref AdminDistribution

  StaticBucketName:
    Description: Shared S3 bucket for all production static sites
    Value: !Ref StaticBucket

  WebAppCloudFrontDomain:
    Description: >
      Web app CloudFront domain (point mishmish.ai and www.mishmish.ai here via ALIAS/CNAME)
    Value: !GetAtt WebAppDistribution.DomainName

  AdminCloudFrontDomain:
    Description: >
      Admin CloudFront domain (point admin.mishmish.ai here via CNAME)
    Value: !GetAtt AdminDistribution.DomainName
