name: Repair Supabase Migration History (Production)

on:
  workflow_dispatch:

jobs:
  repair:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.33.7

      - name: Install dotenvx
        run: curl -sfS https://dotenvx.sh/install.sh | sh

      - name: Link to Supabase project
        env:
          DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PERSONAL_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: dotenvx run -f supabase/.env.production -- sh -c 'supabase link --project-ref $SUPABASE_PROJECT_REF'

      - name: Safety check — verify remote schema matches local migrations
        env:
          DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PERSONAL_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          DIFF=$(dotenvx run -f supabase/.env.production -- sh -c 'supabase db diff --linked' 2>&1)
          if [ -n "$DIFF" ]; then
            echo "::error::Remote schema differs from local migrations. Cannot safely repair migration history."
            echo "$DIFF"
            exit 1
          fi
          echo "✓ Remote schema matches local migrations — safe to proceed."

      - name: Detect and repair migration mismatches
        env:
          DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PERSONAL_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          OUTPUT=$(dotenvx run -f supabase/.env.production -- sh -c 'supabase migration list' 2>&1)
          echo "$OUTPUT"

          # Parse migration list table: extract rows with version numbers
          # Columns: Local | Remote | Time
          # A version present only on remote (not local) needs to be reverted
          # A version present only locally (not remote) needs to be marked applied
          REVERTS=""
          APPLIES=""

          while IFS='|' read -r local remote _; do
            local=$(echo "$local" | xargs)
            remote=$(echo "$remote" | xargs)

            # Skip header/separator lines
            [[ "$local" =~ ^-+$ ]] && continue
            [[ "$local" == "Local" ]] && continue
            [ -z "$local" ] && [ -z "$remote" ] && continue

            if [ -z "$local" ] && [ -n "$remote" ]; then
              REVERTS="$REVERTS $remote"
            elif [ -n "$local" ] && [ -z "$remote" ]; then
              APPLIES="$APPLIES $local"
            fi
          done <<< "$OUTPUT"

          if [ -z "$REVERTS" ] && [ -z "$APPLIES" ]; then
            echo "✓ No mismatches found — migration history is already in sync."
            exit 0
          fi

          for version in $REVERTS; do
            echo "Reverting remote-only version: $version"
            dotenvx run -f supabase/.env.production -- sh -c "supabase migration repair --status reverted $version"
          done

          for version in $APPLIES; do
            echo "Marking local-only version as applied: $version"
            dotenvx run -f supabase/.env.production -- sh -c "supabase migration repair --status applied $version"
          done

      - name: Verify migration history
        env:
          DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PERSONAL_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: dotenvx run -f supabase/.env.production -- sh -c 'supabase migration list'
