name: Build API Docker image

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout
        required: true
        type: string
    outputs:
      image_uri:
        description: Full ECR image URI (registry/repo:tag)
        value: ${{ jobs.build.outputs.image_uri }}

env:
  AWS_REGION: us-west-2

jobs:
  build:
    name: Build & push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Build and push
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA_SHORT: ${{ github.sha }}
        run: |
          SHA_TAG="${SHA_SHORT:0:7}"
          IMAGE_URI="$ECR_REGISTRY/arabic-voice-agent-api:prod-$SHA_TAG"
          docker build -f infra/Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
