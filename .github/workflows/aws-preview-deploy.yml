name: AWS — Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  AWS_REGION: us-west-2

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Job 0: Detect what changed in this PR
  # ------------------------------------------------------------------
  detect-changes:
    name: Detect changed paths
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      deploy_api: ${{ steps.decide.outputs.deploy_api }}
      deploy_frontend: ${{ steps.decide.outputs.deploy_frontend }}
      deploy_supabase: ${{ steps.decide.outputs.deploy_supabase }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'web-api/**'
              - 'infra/Dockerfile'
            frontend:
              - 'web-app/**'
              - 'admin-app/**'
            supabase:
              - 'supabase/migrations/**'
              - 'supabase/config.toml'
              - 'supabase/seed/**'
            infra:
              - 'infra/preview/**'
            workflows:
              - '.github/workflows/aws-preview-deploy.yml'
              - '.github/workflows/aws-preview-destroy.yml'

      - name: Check for release-please label
        id: labels
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | jq -e 'index("autorelease: pending")' > /dev/null 2>&1; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide what to deploy
        id: decide
        run: |
          # If release-please PR, infra templates, or workflow files changed, deploy everything
          if [ "${{ steps.labels.outputs.is_release }}" = "true" ] || [ "${{ steps.filter.outputs.infra }}" = "true" ] || [ "${{ steps.filter.outputs.workflows }}" = "true" ]; then
            echo "deploy_api=true" >> "$GITHUB_OUTPUT"
            echo "deploy_frontend=true" >> "$GITHUB_OUTPUT"
            echo "deploy_supabase=true" >> "$GITHUB_OUTPUT"
          else
            SUPABASE="${{ steps.filter.outputs.supabase }}"
            API="${{ steps.filter.outputs.api }}"
            FRONTEND="${{ steps.filter.outputs.frontend }}"

            # Cascade: supabase change → full stack, api change → api + frontend
            if [ "$SUPABASE" = "true" ]; then
              API=true
              FRONTEND=true
            fi
            if [ "$API" = "true" ]; then
              FRONTEND=true
            fi

            echo "deploy_api=$API" >> "$GITHUB_OUTPUT"
            echo "deploy_frontend=$FRONTEND" >> "$GITHUB_OUTPUT"
            echo "deploy_supabase=$SUPABASE" >> "$GITHUB_OUTPUT"
          fi

          echo "### Change Detection Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Changed |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release-please PR | ${{ steps.labels.outputs.is_release }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API (web-api/) | ${{ steps.filter.outputs.api }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend (web-app/, admin-app/) | ${{ steps.filter.outputs.frontend }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Supabase (migrations/) | ${{ steps.filter.outputs.supabase }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Infra (infra/preview/) | ${{ steps.filter.outputs.infra }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Workflows | ${{ steps.filter.outputs.workflows }} |" >> "$GITHUB_STEP_SUMMARY"

  # ------------------------------------------------------------------
  # Job 1: Wait for Supabase preview branch to be ready
  # ------------------------------------------------------------------
  wait-for-supabase:
    name: Wait for Supabase preview branch
    needs: detect-changes
    if: needs.detect-changes.outputs.deploy_supabase == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Supabase Preview check
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: check
        with:
          checkName: Supabase Preview
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          timeoutSeconds: 600
          intervalSeconds: 15

      - name: Fail if Supabase branch failed
        if: steps.check.outputs.conclusion == 'failure'
        run: exit 1

  # ------------------------------------------------------------------
  # Job 2: Get Supabase credentials (preview branch or main project)
  # ------------------------------------------------------------------
  supabase-credentials:
    name: Get Supabase credentials
    needs: [detect-changes, wait-for-supabase]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      branch_ref: ${{ steps.supabase.outputs.branch_ref }}
      url: ${{ steps.supabase.outputs.url }}
      anon_key_b64: ${{ steps.supabase.outputs.anon_key_b64 }}
      service_key_b64: ${{ steps.supabase.outputs.service_key_b64 }}
      is_preview_branch: ${{ steps.supabase.outputs.is_preview_branch }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PERSONAL_ACCESS_TOKEN }}
    steps:
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Get Supabase credentials
        id: supabase
        run: |
          PROJECT_REF="${{ vars.SUPABASE_PROJECT_REF }}"
          DEPLOY_SUPABASE="${{ needs.detect-changes.outputs.deploy_supabase }}"

          if [ "$DEPLOY_SUPABASE" = "true" ]; then
            # Use preview branch
            BRANCH_NAME="${{ github.head_ref }}"
            BRANCH_JSON=$(curl -sf \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              "https://api.supabase.com/v1/projects/$PROJECT_REF/branches")

            BRANCH_REF=$(echo "$BRANCH_JSON" | jq -r \
              ".[] | select(.git_branch == \"$BRANCH_NAME\") | .project_ref // .ref" | head -1)

            if [ -z "$BRANCH_REF" ]; then
              echo "::error::No Supabase branch found for git branch: $BRANCH_NAME"
              exit 1
            fi
            echo "Using Supabase preview branch: $BRANCH_REF"
            echo "is_preview_branch=true" >> "$GITHUB_OUTPUT"
          else
            # No migration changes — use main project credentials
            BRANCH_REF="$PROJECT_REF"
            echo "No migration changes — using main Supabase project: $BRANCH_REF"
            echo "is_preview_branch=false" >> "$GITHUB_OUTPUT"
          fi

          # Get API keys
          KEYS_JSON=$(curl -sf \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$BRANCH_REF/api-keys")

          ANON_KEY=$(echo "$KEYS_JSON" | jq -r '.[] | select(.name == "anon") | .api_key')
          SERVICE_KEY=$(echo "$KEYS_JSON" | jq -r '.[] | select(.name == "service_role") | .api_key')
          BRANCH_URL="https://$BRANCH_REF.supabase.co"

          echo "::add-mask::$ANON_KEY"
          echo "::add-mask::$SERVICE_KEY"

          # Double base64-encode keys — GitHub masks single-encoded secrets too
          echo "branch_ref=$BRANCH_REF" >> "$GITHUB_OUTPUT"
          echo "url=$BRANCH_URL" >> "$GITHUB_OUTPUT"
          echo "anon_key_b64=$(echo -n "$ANON_KEY" | base64 -w0 | base64 -w0)" >> "$GITHUB_OUTPUT"
          echo "service_key_b64=$(echo -n "$SERVICE_KEY" | base64 -w0 | base64 -w0)" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------
  # Job 3: Build and push API Docker image
  # ------------------------------------------------------------------
  build-api-image:
    name: Build API Docker image
    needs: detect-changes
    if: needs.detect-changes.outputs.deploy_api == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Build and push
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: pr-${{ github.event.pull_request.number }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/arabic-voice-agent-api:$IMAGE_TAG"
          docker build -f infra/Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------
  # Job 4: Deploy API container to shared preview EC2
  # ------------------------------------------------------------------
  deploy-preview-api:
    name: Deploy preview API container
    needs: [detect-changes, supabase-credentials, build-api-image]
    if: always() && !failure() && !cancelled() && needs.detect-changes.outputs.deploy_api == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: dev
    outputs:
      instance_id: ${{ steps.preview-infra.outputs.instance_id }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Decode Supabase credentials
        id: supabase
        run: |
          ANON_KEY=$(echo -n "${{ needs.supabase-credentials.outputs.anon_key_b64 }}" | base64 -d | base64 -d)
          SERVICE_KEY=$(echo -n "${{ needs.supabase-credentials.outputs.service_key_b64 }}" | base64 -d | base64 -d)
          echo "::add-mask::$ANON_KEY"
          echo "::add-mask::$SERVICE_KEY"
          echo "anon_key=$ANON_KEY" >> "$GITHUB_OUTPUT"
          echo "service_key=$SERVICE_KEY" >> "$GITHUB_OUTPUT"

      - name: Get preview EC2 instance ID
        id: preview-infra
        run: |
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name "arabic-voice-agent-preview" \
            --query "Stacks[0].Outputs[?OutputKey=='PreviewInstanceId'].OutputValue" \
            --output text)
          ELASTIC_IP=$(aws cloudformation describe-stacks \
            --stack-name "arabic-voice-agent-preview" \
            --query "Stacks[0].Outputs[?OutputKey=='PreviewElasticIp'].OutputValue" \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "elastic_ip=$ELASTIC_IP" >> "$GITHUB_OUTPUT"

      - name: Deploy container via SSM
        run: |
          INSTANCE_ID="${{ steps.preview-infra.outputs.instance_id }}"
          IMAGE_URI="${{ needs.build-api-image.outputs.image_uri }}"
          ECR_REGISTRY=$(echo "$IMAGE_URI" | cut -d'/' -f1)
          REGION="${{ env.AWS_REGION }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          PORT=$((10000 + PR_NUM))

          SUPABASE_URL="${{ needs.supabase-credentials.outputs.url }}"
          ANON_KEY="${{ steps.supabase.outputs.anon_key }}"
          SERVICE_KEY="${{ steps.supabase.outputs.service_key }}"

          # Write deploy script
          cat > /tmp/deploy.sh <<SCRIPT
          #!/bin/bash
          set -euo pipefail
          exec > >(tee -a /var/log/preview-deploy.log) 2>&1
          echo "=== Preview deploy PR #$PR_NUM at \$(date) ==="

          # Fetch API secrets from Secrets Manager
          SECRET_JSON=\$(aws secretsmanager get-secret-value \
            --secret-id "${{ secrets.PREVIEW_API_SECRET_ARN }}" \
            --region $REGION \
            --query SecretString --output text)

          # Write env file for this PR
          cat > /etc/mishmish/pr-${PR_NUM}.env <<ENVEOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_PUBLISHABLE_KEY=$ANON_KEY
          SUPABASE_SECRET_KEY=$SERVICE_KEY
          OPENAI_API_KEY=\$(echo "\$SECRET_JSON" | jq -r '.OPENAI_API_KEY')
          SONIOX_API_KEY=\$(echo "\$SECRET_JSON" | jq -r '.SONIOX_API_KEY')
          ELEVEN_API_KEY=\$(echo "\$SECRET_JSON" | jq -r '.ELEVEN_API_KEY')
          PORT=8000
          ENVEOF
          chmod 600 /etc/mishmish/pr-${PR_NUM}.env

          # ECR login
          aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

          # Prune unused images to prevent disk fill
          docker image prune -af --filter "until=48h"

          # Pull image
          docker pull $IMAGE_URI

          # Stop old container if exists
          docker stop pr-${PR_NUM} 2>/dev/null || true
          docker rm pr-${PR_NUM} 2>/dev/null || true

          # Start container on unique port
          docker run -d \
            --name pr-${PR_NUM} \
            --restart unless-stopped \
            -p ${PORT}:8000 \
            --env-file /etc/mishmish/pr-${PR_NUM}.env \
            $IMAGE_URI

          # Wait for health check
          echo "Waiting for health check on port ${PORT}..."
          for i in \$(seq 1 30); do
            if curl -sf http://localhost:${PORT}/health > /dev/null 2>&1; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed"
          docker logs pr-${PR_NUM} --tail 50
          exit 1
          SCRIPT

          # Send to SSM
          COMMANDS_JSON=$(jq -R -s 'split("\n") | map(select(length > 0))' < /tmp/deploy.sh)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters "{\"commands\":$COMMANDS_JSON}" \
            --query "Command.CommandId" --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to complete
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text)

          echo "Command status: $RESULT"

          if [ "$RESULT" != "Success" ]; then
            echo "::error::SSM command failed with status: $RESULT"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" --output text
            exit 1
          fi

      - name: Configure API Caddy route via SSM
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          PORT=$((10000 + PR_NUM))
          INSTANCE_ID="${{ steps.preview-infra.outputs.instance_id }}"

          cat > /tmp/caddy-api.sh <<SCRIPT
          #!/bin/bash
          set -euo pipefail
          echo "=== Configuring API Caddy route for PR #$PR_NUM at \$(date) ==="

          # Remove old API block if exists
          sed -i '/^# BEGIN api-pr-${PR_NUM}\$/,/^# END api-pr-${PR_NUM}\$/d' /etc/caddy/Caddyfile

          # Also remove legacy monolithic block (from before selective deploys)
          sed -i '/^# BEGIN pr-${PR_NUM}\$/,/^# END pr-${PR_NUM}\$/d' /etc/caddy/Caddyfile

          # Add API reverse proxy block
          cat >> /etc/caddy/Caddyfile <<'CADDYEOF'

          # BEGIN api-pr-${PR_NUM}
          api-pr-${PR_NUM}.preview.mishmish.ai {
            @cors_preflight method OPTIONS
            handle @cors_preflight {
              header Access-Control-Allow-Origin "*"
              header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
              header Access-Control-Allow-Headers "*"
              header Access-Control-Max-Age "86400"
              respond "" 204
            }
            # ? prefix = set only if not already present (avoids duplicate with FastAPI)
            header ?Access-Control-Allow-Origin "*"
            header ?Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
            header ?Access-Control-Allow-Headers "*"

            reverse_proxy localhost:${PORT}
          }
          # END api-pr-${PR_NUM}
          CADDYEOF

          systemctl reload caddy
          echo "API Caddy route configured for PR #$PR_NUM"
          SCRIPT

          COMMANDS_JSON=$(jq -R -s 'split("\n") | map(select(length > 0))' < /tmp/caddy-api.sh)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 120 \
            --parameters "{\"commands\":$COMMANDS_JSON}" \
            --query "Command.CommandId" --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text)

          echo "API Caddy config status: $RESULT"
          if [ "$RESULT" != "Success" ]; then
            echo "::error::API Caddy config failed"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" --output text
            exit 1
          fi

  # ------------------------------------------------------------------
  # Job 4b: Compute preview URLs (always runs)
  # ------------------------------------------------------------------
  compute-preview-urls:
    name: Compute preview URLs
    needs: [detect-changes, deploy-preview-api]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.urls.outputs.api_url }}
      web_app_url: ${{ steps.urls.outputs.web_app_url }}
      admin_url: ${{ steps.urls.outputs.admin_url }}
      instance_id: ${{ steps.urls.outputs.instance_id }}
    steps:
      - name: Compute URLs
        id: urls
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          DEPLOY_API="${{ needs.detect-changes.outputs.deploy_api }}"

          if [ "$DEPLOY_API" = "true" ]; then
            echo "api_url=https://api-pr-${PR_NUM}.preview.mishmish.ai" >> "$GITHUB_OUTPUT"
            echo "instance_id=${{ needs.deploy-preview-api.outputs.instance_id }}" >> "$GITHUB_OUTPUT"
          else
            # No API changes — point frontends at production API
            echo "api_url=${{ vars.PRODUCTION_API_URL }}" >> "$GITHUB_OUTPUT"
            echo "instance_id=" >> "$GITHUB_OUTPUT"
          fi

          echo "web_app_url=https://pr-${PR_NUM}.preview.mishmish.ai" >> "$GITHUB_OUTPUT"
          echo "admin_url=https://admin-pr-${PR_NUM}.preview.mishmish.ai" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------
  # Job 5: Build static sites and upload to shared S3 bucket
  # ------------------------------------------------------------------
  deploy-static-sites:
    name: Deploy static sites
    needs: [detect-changes, supabase-credentials, compute-preview-urls]
    if: always() && !failure() && !cancelled() && needs.detect-changes.outputs.deploy_frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: dev
    outputs:
      instance_id: ${{ steps.preview-infra.outputs.instance_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Fetch shared preview infra outputs (bucket, CloudFront)
      - name: Get shared preview infra outputs
        id: preview-infra
        run: |
          get_output() {
            aws cloudformation describe-stacks \
              --stack-name "arabic-voice-agent-preview" \
              --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" \
              --output text
          }
          echo "instance_id=$(get_output PreviewInstanceId)" >> "$GITHUB_OUTPUT"
          echo "bucket=$(get_output PreviewStaticBucketName)" >> "$GITHUB_OUTPUT"
          echo "dist_id=$(get_output PreviewStaticDistributionId)" >> "$GITHUB_OUTPUT"
          echo "cf_domain=$(get_output PreviewStaticDistributionDomain)" >> "$GITHUB_OUTPUT"

      # Build and deploy web-app
      - name: Build web-app
        working-directory: web-app
        env:
          VITE_API_URL: ${{ needs.compute-preview-urls.outputs.api_url }}
        run: |
          npm ci
          npm run build

      - name: Upload web-app to S3
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          aws s3 sync web-app/dist/ \
            "s3://${{ steps.preview-infra.outputs.bucket }}/pr-${PR_NUM}/web-app/" \
            --delete

      # Build and deploy admin-app
      - name: Build admin-app
        working-directory: admin-app
        env:
          VITE_API_URL: ${{ needs.compute-preview-urls.outputs.api_url }}
        run: |
          npm ci
          npm run build

      - name: Upload admin-app to S3
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          aws s3 sync admin-app/dist/ \
            "s3://${{ steps.preview-infra.outputs.bucket }}/pr-${PR_NUM}/admin-app/" \
            --delete

      # Invalidate CloudFront cache (scoped to this PR's paths)
      - name: Invalidate CloudFront cache
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.preview-infra.outputs.dist_id }}" \
            --paths "/pr-${PR_NUM}/*"

      # Configure Caddy to route frontend preview subdomains via shared CloudFront
      - name: Configure frontend Caddy routes via SSM
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          INSTANCE_ID="${{ steps.preview-infra.outputs.instance_id }}"
          CF_DOMAIN="${{ steps.preview-infra.outputs.cf_domain }}"

          cat > /tmp/caddy-frontend.sh <<SCRIPT
          #!/bin/bash
          set -euo pipefail
          echo "=== Configuring frontend Caddy routes for PR #$PR_NUM at \$(date) ==="

          # Remove old frontend block if exists
          sed -i '/^# BEGIN web-pr-${PR_NUM}\$/,/^# END web-pr-${PR_NUM}\$/d' /etc/caddy/Caddyfile

          # Add frontend reverse proxy blocks with path rewriting
          cat >> /etc/caddy/Caddyfile <<'CADDYEOF'

          # BEGIN web-pr-${PR_NUM}
          pr-${PR_NUM}.preview.mishmish.ai {
            rewrite * /pr-${PR_NUM}/web-app{uri}
            reverse_proxy https://${CF_DOMAIN} {
              header_up Host {upstream_hostport}
            }
          }
          admin-pr-${PR_NUM}.preview.mishmish.ai {
            rewrite * /pr-${PR_NUM}/admin-app{uri}
            reverse_proxy https://${CF_DOMAIN} {
              header_up Host {upstream_hostport}
            }
          }
          # END web-pr-${PR_NUM}
          CADDYEOF

          systemctl reload caddy
          echo "Frontend Caddy routes configured for PR #$PR_NUM"
          SCRIPT

          COMMANDS_JSON=$(jq -R -s 'split("\n") | map(select(length > 0))' < /tmp/caddy-frontend.sh)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 120 \
            --parameters "{\"commands\":$COMMANDS_JSON}" \
            --query "Command.CommandId" --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text)

          echo "Frontend Caddy config status: $RESULT"
          if [ "$RESULT" != "Success" ]; then
            echo "::error::Frontend Caddy config failed"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" --output text
            exit 1
          fi

      # Set Supabase SITE_URL to the preview web-app URL (only for preview branches)
      - name: Set Supabase SITE_URL
        if: needs.supabase-credentials.outputs.is_preview_branch == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PERSONAL_ACCESS_TOKEN }}
        run: |
          BRANCH_REF="${{ needs.supabase-credentials.outputs.branch_ref }}"
          SITE_URL="${{ needs.compute-preview-urls.outputs.web_app_url }}"
          supabase secrets set --project-ref "$BRANCH_REF" SITE_URL="$SITE_URL"
          echo "Set SITE_URL=$SITE_URL on Supabase branch $BRANCH_REF"

  # ------------------------------------------------------------------
  # Job 7: Post PR comment with preview URLs (always runs)
  # ------------------------------------------------------------------
  post-comment:
    name: Post preview URLs comment
    needs: [detect-changes, compute-preview-urls, supabase-credentials, deploy-preview-api, deploy-static-sites]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const deployApi = '${{ needs.detect-changes.outputs.deploy_api }}' === 'true';
            const deployFrontend = '${{ needs.detect-changes.outputs.deploy_frontend }}' === 'true';
            const deploySupabase = '${{ needs.detect-changes.outputs.deploy_supabase }}' === 'true';

            const apiUrl = '${{ needs.compute-preview-urls.outputs.api_url }}';
            const webAppUrl = '${{ needs.compute-preview-urls.outputs.web_app_url }}';
            const adminUrl = '${{ needs.compute-preview-urls.outputs.admin_url }}';
            const supabaseUrl = '${{ needs.supabase-credentials.outputs.url }}';

            const rows = [];
            if (deployFrontend) {
              rows.push(`| Web App | ${webAppUrl} |`);
              rows.push(`| Admin | ${adminUrl} |`);
            }
            rows.push(`| API | ${apiUrl} ${deployApi ? '' : '_(production — no API changes)_'} |`);

            const skipped = [];
            if (!deployApi) skipped.push('API build/deploy (no changes in `web-api/`)');
            if (!deployFrontend) skipped.push('Frontend build/deploy (no changes in `web-app/` or `admin-app/`)');
            if (!deploySupabase) skipped.push('Supabase preview branch (no migration changes)');

            const lines = [
              '### Preview Environment Ready',
              '',
              '| Service | URL |',
              '|---------|-----|',
              ...rows,
              '',
              deploySupabase
                ? `_Supabase branch: ${supabaseUrl}_`
                : '_Supabase: using main project (no migration changes)_',
            ];

            if (skipped.length > 0) {
              lines.push('');
              lines.push(`**Skipped:** ${skipped.join(', ')}`);
            }

            const body = lines.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('### Preview Environment Ready')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
