name: Build static sites

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout
        required: true
        type: string
      api_url:
        description: API URL from deploy-infra output
        required: true
        type: string

jobs:
  build:
    name: Build web-app & admin-app
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build web-app
        working-directory: web-app
        env:
          VITE_API_URL: ${{ inputs.api_url }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          npm ci
          npm run build

      - name: Build admin-app
        working-directory: admin-app
        env:
          VITE_API_URL: ${{ inputs.api_url }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          npm ci
          npm run build

      - name: Upload web-app artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app-dist
          path: web-app/dist/
          retention-days: 1

      - name: Upload admin-app artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-dist
          path: admin-app/dist/
          retention-days: 1
