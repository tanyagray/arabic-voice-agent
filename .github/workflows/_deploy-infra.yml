name: Deploy production infrastructure

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout
        required: true
        type: string
      image_uri:
        description: ECR image URI for the API container
        required: true
        type: string
    outputs:
      api_url:
        description: API endpoint URL
        value: ${{ jobs.deploy.outputs.api_url }}
      api_instance_id:
        description: EC2 instance ID for SSM commands
        value: ${{ jobs.deploy.outputs.api_instance_id }}
      static_bucket:
        value: ${{ jobs.deploy.outputs.static_bucket }}
      web_app_dist_id:
        value: ${{ jobs.deploy.outputs.web_app_dist_id }}
      admin_dist_id:
        value: ${{ jobs.deploy.outputs.admin_dist_id }}
      web_app_cf_domain:
        value: ${{ jobs.deploy.outputs.web_app_cf_domain }}
      admin_cf_domain:
        value: ${{ jobs.deploy.outputs.admin_cf_domain }}

env:
  AWS_REGION: us-west-2
  TF_IN_AUTOMATION: "true"

jobs:
  deploy:
    name: Terraform apply (aws/prod)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: production
    outputs:
      api_url: ${{ steps.tf.outputs.api_url }}
      api_instance_id: ${{ steps.tf.outputs.api_instance_id }}
      static_bucket: ${{ steps.tf.outputs.static_bucket }}
      web_app_dist_id: ${{ steps.tf.outputs.web_app_dist_id }}
      admin_dist_id: ${{ steps.tf.outputs.admin_dist_id }}
      web_app_cf_domain: ${{ steps.tf.outputs.web_app_cf_domain }}
      admin_cf_domain: ${{ steps.tf.outputs.admin_cf_domain }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.3
          terraform_wrapper: false

      - name: Terraform init
        working-directory: aws/prod
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: aws/prod
        run: |
          terraform apply -auto-approve -input=false \
            -var="api_image_uri=${{ inputs.image_uri }}" \
            -var="api_secret_arn=${{ secrets.API_SECRET_ARN }}"

      - name: Capture outputs
        id: tf
        working-directory: aws/prod
        run: |
          echo "api_url=$(terraform output -raw api_url)" >> "$GITHUB_OUTPUT"
          echo "api_instance_id=$(terraform output -raw api_instance_id)" >> "$GITHUB_OUTPUT"
          echo "static_bucket=$(terraform output -raw static_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "web_app_dist_id=$(terraform output -raw web_app_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "admin_dist_id=$(terraform output -raw admin_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "web_app_cf_domain=$(terraform output -raw web_app_cloudfront_domain)" >> "$GITHUB_OUTPUT"
          echo "admin_cf_domain=$(terraform output -raw admin_cloudfront_domain)" >> "$GITHUB_OUTPUT"

      - name: Print API Elastic IP
        working-directory: aws/prod
        run: |
          API_EIP=$(terraform output -raw api_elastic_ip)

          echo "### API DNS record required" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Point \`api.mishmish.ai\` A record to: \`$API_EIP\`" >> "$GITHUB_STEP_SUMMARY"
