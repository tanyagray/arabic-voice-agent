name: Deploy to Supabase (Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: production
      url: ${{ vars.SITE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Supabase Setup
        uses: supabase/setup-cli@v1
        with:
          version: 2.33.7

      - name: Supabase Deploy
        env:
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PERSONAL_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
        run: |
          supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
          npx --yes @dotenvx/dotenvx run --env-file=supabase/.env.production -- supabase config push
          supabase db push --include-seed
