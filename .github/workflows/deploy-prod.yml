name: Deploy Production (AWS)

on:
  push:
    branches: [main]
    paths:
      - "web-api/**"
      - "web-app/**"
      - "admin-app/**"
      - "infra/prod/**"
      - "infra/Dockerfile"
  workflow_dispatch:

env:
  AWS_REGION: us-west-2

jobs:
  # ------------------------------------------------------------------
  # Job 1: Build and push API Docker image
  # ------------------------------------------------------------------
  build-api-image:
    name: Build API Docker image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Build and push
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA_SHORT: ${{ github.sha }}
        run: |
          SHA_TAG="${SHA_SHORT:0:7}"
          IMAGE_URI="$ECR_REGISTRY/arabic-voice-agent-api:prod-$SHA_TAG"
          docker build -f infra/Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------
  # Job 2: Deploy CloudFormation stack
  # ------------------------------------------------------------------
  deploy-infra:
    name: Deploy production infrastructure
    needs: build-api-image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: production
    outputs:
      api_url: ${{ steps.outputs.outputs.api_url }}
      api_instance_id: ${{ steps.outputs.outputs.api_instance_id }}
      web_app_url: ${{ steps.outputs.outputs.web_app_url }}
      admin_url: ${{ steps.outputs.outputs.admin_url }}
      web_app_bucket: ${{ steps.outputs.outputs.web_app_bucket }}
      admin_bucket: ${{ steps.outputs.outputs.admin_bucket }}
      web_app_dist_id: ${{ steps.outputs.outputs.web_app_dist_id }}
      admin_dist_id: ${{ steps.outputs.outputs.admin_dist_id }}
      web_app_cf_domain: ${{ steps.outputs.outputs.web_app_cf_domain }}
      admin_cf_domain: ${{ steps.outputs.outputs.admin_cf_domain }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get bootstrap stack outputs
        id: bootstrap
        run: |
          get_output() {
            aws cloudformation describe-stacks \
              --stack-name "arabic-voice-agent-bootstrap" \
              --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" \
              --output text
          }
          echo "vpc_id=$(get_output VpcId)" >> "$GITHUB_OUTPUT"
          echo "subnet_id=$(get_output SubnetAId)" >> "$GITHUB_OUTPUT"
          echo "ec2_instance_profile=$(get_output Ec2InstanceProfileName)" >> "$GITHUB_OUTPUT"

      - name: Clean up failed stack if needed
        run: |
          STACK_NAME="arabic-voice-agent-prod"
          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [ "$STATUS" = "ROLLBACK_IN_PROGRESS" ]; then
            echo "Stack $STACK_NAME is rolling back, waiting..."
            aws cloudformation wait stack-rollback-complete --stack-name "$STACK_NAME"
            STATUS="ROLLBACK_COMPLETE"
          fi
          if [ "$STATUS" = "UPDATE_ROLLBACK_FAILED" ]; then
            echo "Stack $STACK_NAME is stuck in UPDATE_ROLLBACK_FAILED, attempting continue-update-rollback..."
            aws cloudformation continue-update-rollback --stack-name "$STACK_NAME"
            aws cloudformation wait stack-rollback-complete --stack-name "$STACK_NAME"
            STATUS="UPDATE_ROLLBACK_COMPLETE"
          fi
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STATUS" = "DELETE_FAILED" ] || [ "$STATUS" = "REVIEW_IN_PROGRESS" ]; then
            echo "Stack $STACK_NAME is in $STATUS state, deleting before redeploy..."
            aws cloudformation delete-stack --stack-name "$STACK_NAME"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME"
          fi

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --stack-name "arabic-voice-agent-prod" \
            --template-file infra/prod/template.yaml \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              AcmCertificateArn="${{ secrets.AWS_ACM_CERTIFICATE_ARN }}" \
              EcrImageUri="${{ needs.build-api-image.outputs.image_uri }}" \
              VpcId="${{ steps.bootstrap.outputs.vpc_id }}" \
              SubnetId="${{ steps.bootstrap.outputs.subnet_id }}" \
              Ec2InstanceProfileName="${{ steps.bootstrap.outputs.ec2_instance_profile }}" \
              ApiSecretArn="${{ secrets.API_SECRET_ARN }}"

      - name: Get stack outputs
        id: outputs
        run: |
          get_output() {
            aws cloudformation describe-stacks \
              --stack-name "arabic-voice-agent-prod" \
              --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" \
              --output text
          }

          echo "api_url=$(get_output ApiUrl)" >> "$GITHUB_OUTPUT"
          echo "api_instance_id=$(get_output ApiInstanceId)" >> "$GITHUB_OUTPUT"
          echo "web_app_url=$(get_output WebAppUrl)" >> "$GITHUB_OUTPUT"
          echo "admin_url=$(get_output AdminUrl)" >> "$GITHUB_OUTPUT"
          echo "web_app_bucket=$(get_output WebAppBucketName)" >> "$GITHUB_OUTPUT"
          echo "admin_bucket=$(get_output AdminBucketName)" >> "$GITHUB_OUTPUT"
          echo "web_app_dist_id=$(get_output WebAppDistributionId)" >> "$GITHUB_OUTPUT"
          echo "admin_dist_id=$(get_output AdminDistributionId)" >> "$GITHUB_OUTPUT"
          echo "web_app_cf_domain=$(get_output WebAppCloudFrontDomain)" >> "$GITHUB_OUTPUT"
          echo "admin_cf_domain=$(get_output AdminCloudFrontDomain)" >> "$GITHUB_OUTPUT"

      - name: Print API Elastic IP
        run: |
          API_EIP=$(aws cloudformation describe-stacks \
            --stack-name "arabic-voice-agent-prod" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiElasticIp'].OutputValue" \
            --output text)

          echo "### API DNS record required" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Point \`api.mishmish.ai\` A record to: \`$API_EIP\`" >> "$GITHUB_STEP_SUMMARY"

  # ------------------------------------------------------------------
  # Job 3: Deploy API container to EC2 via SSM
  # ------------------------------------------------------------------
  deploy-api:
    name: Deploy API container
    needs: [build-api-image, deploy-infra]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: production
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for SSM agent to be ready
        run: |
          INSTANCE_ID="${{ needs.deploy-infra.outputs.api_instance_id }}"
          echo "Waiting for SSM agent on instance $INSTANCE_ID..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "NotFound")
            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent is online."
              break
            fi
            echo "  Attempt $i: SSM status=$STATUS, waiting 10s..."
            sleep 10
          done
          if [ "$STATUS" != "Online" ]; then
            echo "::error::SSM agent not online after 5 minutes"
            exit 1
          fi

      - name: Deploy container via SSM
        run: |
          INSTANCE_ID="${{ needs.deploy-infra.outputs.api_instance_id }}"
          IMAGE_URI="${{ needs.build-api-image.outputs.image_uri }}"
          ECR_REGISTRY=$(echo "$IMAGE_URI" | cut -d'/' -f1)
          REGION="${{ env.AWS_REGION }}"

          # Write deploy script to temp file
          cat > /tmp/deploy.sh <<SCRIPT
          #!/bin/bash
          set -euo pipefail
          exec > >(tee -a /var/log/deploy.log) 2>&1
          echo "=== Deploy started at \$(date) ==="
          aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
          docker pull $IMAGE_URI
          docker stop api 2>/dev/null || true
          docker rm api 2>/dev/null || true
          docker run -d --name api --restart unless-stopped -p 8000:8000 --env-file /etc/mishmish/api.env $IMAGE_URI
          echo "Waiting for health check..."
          for i in \$(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after 60 seconds"
          docker logs api --tail 50
          exit 1
          SCRIPT

          # Convert script lines to JSON array for SSM
          COMMANDS_JSON=$(jq -R -s 'split("\n") | map(select(length > 0))' < /tmp/deploy.sh)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters "{\"commands\":$COMMANDS_JSON}" \
            --query "Command.CommandId" --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to complete
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          # Check result
          RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text)

          echo "Command status: $RESULT"

          if [ "$RESULT" != "Success" ]; then
            echo "::error::SSM command failed with status: $RESULT"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" --output text
            exit 1
          fi

  # ------------------------------------------------------------------
  # Job 4: Build static sites and upload to S3
  # ------------------------------------------------------------------
  deploy-static-sites:
    name: Deploy static sites
    needs: deploy-infra
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Build and deploy web-app
      - name: Build web-app
        working-directory: web-app
        env:
          VITE_API_URL: ${{ vars.API_URL || needs.deploy-infra.outputs.api_url }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          npm ci
          npm run build

      - name: Upload web-app to S3
        run: |
          aws s3 sync web-app/dist/ \
            "s3://${{ needs.deploy-infra.outputs.web_app_bucket }}/" \
            --delete

      # Build and deploy admin-app
      - name: Build admin-app
        working-directory: admin-app
        env:
          VITE_API_URL: ${{ needs.deploy-infra.outputs.api_url }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          npm ci
          npm run build

      - name: Upload admin-app to S3
        run: |
          aws s3 sync admin-app/dist/ \
            "s3://${{ needs.deploy-infra.outputs.admin_bucket }}/" \
            --delete

      # Invalidate CloudFront caches
      - name: Invalidate CloudFront caches
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.deploy-infra.outputs.web_app_dist_id }}" \
            --paths "/*"
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.deploy-infra.outputs.admin_dist_id }}" \
            --paths "/*"

      - name: Print deployment URLs
        run: |
          echo "### Production Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Custom Domain | CloudFront URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|---------------|----------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| API | https://api.mishmish.ai | ${{ needs.deploy-infra.outputs.api_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web App | https://mishmish.ai | https://${{ needs.deploy-infra.outputs.web_app_cf_domain }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Admin | https://admin.mishmish.ai | https://${{ needs.deploy-infra.outputs.admin_cf_domain }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Claude Agent is managed by the \`arabic-voice-agent-claude-agent\` stack — see the sync-claude-agent workflow._" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**DNS records required** (set these at your DNS provider):" >> "$GITHUB_STEP_SUMMARY"
          echo "| Record | Type | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| mishmish.ai | ALIAS/ANAME | ${{ needs.deploy-infra.outputs.web_app_cf_domain }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| www.mishmish.ai | CNAME | ${{ needs.deploy-infra.outputs.web_app_cf_domain }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| admin.mishmish.ai | CNAME | ${{ needs.deploy-infra.outputs.admin_cf_domain }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| api.mishmish.ai | A | (see API DNS record section above) |" >> "$GITHUB_STEP_SUMMARY"
