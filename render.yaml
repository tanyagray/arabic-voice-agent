# yaml-language-server: $schema=https://render.com/schema/render.yaml.json

previews:
  generation: "off"

services:
  # Claude Agent Service (main branch only, stays on Render)
  - type: web
    name: arabic-voice-agent-claude-agent
    runtime: image
    image:
      url: ghcr.io/tanyagray/claude-agent:latest
    region: oregon
    plan: standard
    previews:
      generation: "off"
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: tanyagray/arabic-voice-agent
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /health
